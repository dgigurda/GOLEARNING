with-expecter: true
boilerplate-file: ".mockery_boilerplate_text.txt"
dir: "{{.InterfaceDir}}/mocks"
filename: "mock_{{.InterfaceNameSnake}}.go"
outpkg: "mocks"
mockname: "{{.InterfaceName}}"
resolve-type-alias: False
issue-845-fix: True

packages:
  golearning/inventory/internal/service:
    config:
      include-regex: ".*Service"

  golearning/inventory/internal/repository:
    config:
      include-regex: ".*Repository"

  golearning/order/internal/service:
    config:
      include-regex: ".*Service"

  golearning/order/internal/repository:
    config:
      include-regex: ".*Repository"

  golearning/payment/internal/service:
    config:
      include-regex: ".*Service"

  golearning/payment/internal/repository:
    config:
      include-regex: ".*Repository"
